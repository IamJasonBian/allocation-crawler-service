<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>allocation-agent · operator dashboard</title>
  <!-- Render API base. Override at deploy time by editing this tag, or per-browser
       via localStorage.setItem('apiBase', 'https://your-api.onrender.com'). -->
  <meta name="api-base" content="https://allocation-api-avzn.onrender.com" />
  <meta name="flower-base" content="https://allocation-flower.onrender.com" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header>
    <div class="row">
      <h1>allocation-agent</h1>
      <span id="status-pill" class="pill dim">connecting…</span>
    </div>
    <div class="row identity">
      <button id="signin-google" class="btn-google" hidden>
        <svg width="16" height="16" viewBox="0 0 18 18" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.79 2.72v2.26h2.9c1.7-1.56 2.69-3.87 2.69-6.62z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.83.86-3.06.86-2.36 0-4.36-1.6-5.07-3.74H.96v2.34A8.99 8.99 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.93 10.68a5.4 5.4 0 0 1 0-3.36V4.98H.96a9 9 0 0 0 0 8.04l2.97-2.34z"/>
          <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.46 3.44 1.35l2.58-2.58A8.99 8.99 0 0 0 .96 4.98l2.97 2.34C4.64 5.18 6.64 3.58 9 3.58z"/>
        </svg>
        <span>Sign in with Google</span>
      </button>
      <span id="me" class="muted">not authenticated</span>
      <button id="signout" hidden>Sign out</button>
      <details id="mock-fallback">
        <summary class="muted">or use mock identity</summary>
        <span class="row" style="margin-top:0.4rem">
          <input id="mock-email" type="email" placeholder="alice@example.com" autocomplete="off" />
          <button id="apply-identity">Apply</button>
        </span>
      </details>
      <span class="grow"></span>
      <a id="flower-link" target="_blank" rel="noopener">Flower&nbsp;↗</a>
      <a id="docs-link" target="_blank" rel="noopener">API docs&nbsp;↗</a>
    </div>
  </header>

  <main>
    <section>
      <h2>Queues</h2>
      <div id="queues" class="grid"></div>
    </section>

    <section>
      <h2>Workers</h2>
      <div id="workers" class="grid"></div>
    </section>

    <section>
      <h2>Recent outcomes</h2>
      <p id="rollup" class="muted"></p>
      <table>
        <thead>
          <tr><th>Candidate</th><th>Job</th><th>ATS</th><th>Status</th><th>Finished</th></tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>

    <p id="fetched" class="muted"></p>
  </main>

  <script src="./app.js"></script>
</body>
</html>
